version: '3.8'

# ============================================================================
# DEFAULT DOCKER COMPOSE FILE - USE PLATFORM-SPECIFIC FILES INSTEAD
# ============================================================================
# 
# This file is a reference/template. Use platform-specific files:
#
#   Linux:   docker-compose -f docker-compose.linux.yml up -d
#   Windows: docker-compose -f docker-compose.windows.yml up -d
#            OR use docker-run-gpu.bat for GPU support
#
# See README_DOCKER_COMPOSE.md for detailed instructions.
# ============================================================================

services:
  inference-pipeline:
    build:
      context: .
      dockerfile: Dockerfile.inference
    image: satellite-inference-pipeline:latest
    container_name: inference-pipeline
    restart: unless-stopped
    
    # Environment variables
    environment:
      - PYTHONUNBUFFERED=1
      - USE_WATCHDOG_IN_DOCKER=1
    
    # GPU support - See platform-specific compose files:
    # - docker-compose.linux.yml (uses runtime: nvidia)
    # - docker-compose.windows.yml (CPU mode, use docker-run-gpu.bat for GPU)
    
    # Volume mounts (all read-write for full user access)
    # Use relative paths - adjust based on your setup
    volumes:
      # Mount input directory (watch for new images)
      - ./data/incoming:/app/data/incoming
      
      # Mount output directories (persist results)
      - ./artifacts:/app/artifacts
      
      # Mount state directory (persist queue and cache)
      - ./state:/app/state
      
      # Mount logs directory
      - ./logs:/app/logs
      
      # Mount models directory
      - ./models:/app/models
      
      # Mount config directory
      - ./config:/app/config
    
    # Ports
    ports:
      - "8092:8092"  # Dashboard port
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Resource limits
    # See platform-specific compose files for GPU configuration
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G
        reservations:
          cpus: '2'
          memory: 4G

  # Optional: Separate dashboard service (if you want to run it independently)
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.inference
    image: satellite-inference-pipeline:latest
    container_name: inference-dashboard
    # Override entrypoint to run dashboard instead of pipeline
    entrypoint: ["sh", "-c"]
    command: ["if [ -f /app/config/pipeline.yaml ]; then CONFIG=/app/config/pipeline.yaml; else CONFIG=/app/config/pipeline.yaml.default; fi && /opt/conda/bin/conda run --no-capture-output -n inference python /app/dashboard_server.py --config \"$CONFIG\""]
    ports:
      - "8093:8092"  # Different port to avoid conflict
    volumes:
      - ./artifacts:/app/artifacts
      - ./config:/app/config
    depends_on:
      - inference-pipeline
    profiles:
      - dashboard-only  # Use: docker-compose --profile dashboard-only up dashboard
